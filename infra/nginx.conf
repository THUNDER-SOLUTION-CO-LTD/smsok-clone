# SMSOK Clone — Production Nginx Config
# Install: cp infra/nginx.conf /etc/nginx/sites-available/smsok
#          ln -sf /etc/nginx/sites-available/smsok /etc/nginx/sites-enabled/smsok
#          rm -f /etc/nginx/sites-enabled/default
#          nginx -t && systemctl reload nginx

# Rate limiting zones (http context — before server blocks)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

upstream smsok_app {
    server 127.0.0.1:3458;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ───
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_PLACEHOLDER;

    # ── SSL (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/chain.pem;

    # Protocols & ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Client limits ──
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── Proxy defaults ──
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # ── Next.js static files (immutable — 1 year cache) ──
    location /_next/static/ {
        proxy_pass http://smsok_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public assets (favicon, images) ──
    location /public/ {
        proxy_pass http://smsok_app;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── Health check (no rate limit, no logs) ──
    location /api/health {
        proxy_pass http://smsok_app;
        access_log off;
    }

    # ── Auth endpoints (strict rate limit — 10r/s) ──
    location /api/auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://smsok_app;
    }

    # ── API endpoints (100r/s rate limit) ──
    location /api/ {
        limit_req zone=api burst=200 nodelay;
        proxy_pass http://smsok_app;
    }

    # ── All other routes (Next.js pages + WebSocket) ──
    location / {
        proxy_pass http://smsok_app;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Block sensitive paths ──
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
}
