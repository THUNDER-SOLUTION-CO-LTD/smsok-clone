# SMSOK Clone — Logrotate Config
# Install: cp infra/logrotate.conf /etc/logrotate.d/smsok
/var/log/smsok/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 nextjs nodejs
    sharedscripts
    postrotate
        # Signal PM2 to reopen log files (if using PM2)
        pm2 reloadLogs 2>/dev/null || true
        # Signal Docker containers to rotate (if using Docker logging)
        docker kill --signal=USR1 smsok-clone-app-1 2>/dev/null || true
    endscript
}

/var/log/smsok-backup.log
/var/log/smsok-monitor.log
/var/log/smsok-uptime.log
/var/log/certbot-renew.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
