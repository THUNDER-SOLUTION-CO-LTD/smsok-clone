name: Deploy to Production

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

  # Auto-trigger after CI build completes
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    environment: production
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "sha=manual" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      # Primary: Trigger Watchtower to pull immediately
      - name: Trigger Watchtower
        id: watchtower
        continue-on-error: true
        env:
          WATCHTOWER_URL: ${{ secrets.WATCHTOWER_URL }}
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
        run: |
          if [ -z "$WATCHTOWER_URL" ] || [ -z "$WATCHTOWER_TOKEN" ]; then
            echo "Watchtower not configured — skipping"
            echo "triggered=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Triggering Watchtower at $WATCHTOWER_URL..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
            "$WATCHTOWER_URL/v1/update" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Watchtower triggered successfully"
            echo "triggered=true" >> $GITHUB_OUTPUT
          else
            echo "Watchtower trigger failed (HTTP $HTTP_CODE) — will auto-poll within 60s"
            echo "triggered=false" >> $GITHUB_OUTPUT
          fi

      # Fallback: SSH deploy
      - name: Deploy via SSH
        if: steps.watchtower.outputs.triggered != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/smsok-clone
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans app
            sleep 10
            curl -sf http://localhost:3458/api/health/ready && echo "Healthy!" || echo "WARNING: not healthy yet"
            docker image prune -f

      # Verify health
      - name: Verify Production
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$SERVER_HOST" ]; then
            echo "SERVER_HOST not set — skipping"
            exit 0
          fi
          echo "Waiting for deploy to complete..."
          sleep 30
          HEALTHY=false
          for i in 1 2 3 4 5 6; do
            HEALTH=$(curl -sf --max-time 10 "http://$SERVER_HOST:3458/api/health" 2>/dev/null || echo '{}')
            if echo "$HEALTH" | grep -q '"status":"healthy"'; then
              echo "Production is HEALTHY!"
              echo "$HEALTH" | jq . 2>/dev/null || echo "$HEALTH"
              HEALTHY=true
              break
            fi
            echo "Attempt $i/6 — waiting 15s..."
            sleep 15
          done
          if [ "$HEALTHY" = false ]; then
            echo "::warning::Production health check inconclusive after 2 minutes"
          fi

      # Summary
      - name: Deploy Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.tag.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Watchtower | ${{ steps.watchtower.outputs.triggered == 'true' && 'Triggered' || 'Skipped/Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy method: Watchtower auto-pull + SSH fallback" >> $GITHUB_STEP_SUMMARY
