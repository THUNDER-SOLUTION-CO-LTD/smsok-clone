name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to 103.114.203.44
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/smsok-clone
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            npm install --force
            LIGHTNING_VER="$(node -e 'console.log(require("./node_modules/lightningcss/package.json").version)')"
            OXIDE_VER="$(node -e 'console.log(require("./node_modules/@tailwindcss/oxide/package.json").version)')"
            npm install "lightningcss-linux-x64-gnu@${LIGHTNING_VER}" "@tailwindcss/oxide-linux-x64-gnu@${OXIDE_VER}" --no-save --force
            NEXT_TELEMETRY_DISABLED=1 npm run build
            pm2 restart smsok --update-env || pm2 start npm --name smsok -- start
            pm2 save

      - name: Verify health
        run: curl -fsS --retry 5 --retry-delay 5 https://smsok.9phum.me/api/health
