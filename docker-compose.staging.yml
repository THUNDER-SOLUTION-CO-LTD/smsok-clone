services:
  app:
    image: ghcr.io/lambogreny/smsok-clone:latest
    ports:
      - "3459:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${STAGING_DB_USER:-smsok}:${STAGING_DB_PASSWORD:?set STAGING_DB_PASSWORD}@postgres:5432/${STAGING_DB_NAME:-smsok_staging}
      - REDIS_URL=${STAGING_REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${STAGING_JWT_SECRET:?set STAGING_JWT_SECRET}
      - COMMIT_SHA=${COMMIT_SHA:-staging}
      - NEXT_PUBLIC_APP_URL=${STAGING_APP_URL:-http://localhost:3459}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/ready"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${STAGING_DB_USER:-smsok}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:?set STAGING_DB_PASSWORD}
      POSTGRES_DB: ${STAGING_DB_NAME:-smsok_staging}
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_DB_USER:-smsok}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  staging_pgdata:
